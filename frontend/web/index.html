<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eSIMNest - Global Data eSIM</title>
  <meta name="description" content="eSIMNest - Global Data eSIM. A Tech Talk Titans Product.">
  
  <!-- ✅ FAVICON - Corrected path -->
  <link rel="icon" type="image/png" href="../assets/images/logo.png">
  <link rel="apple-touch-icon" href="../assets/images/logo.png">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0A1628;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      color: #F59E0B;
    }
    #loading .logo-img {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      object-fit: contain;
    }
    #loading .brand {
      font-size: 28px;
      font-weight: bold;
    }
    #loading .slogan {
      font-size: 14px;
      color: #94A3B8;
    }
    #loading .company {
      font-size: 11px;
      color: #64748B;
      margin-top: 8px;
    }
    .spinner {
      margin-top: 24px;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(245, 158, 11, 0.2);
      border-top-color: #F59E0B;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <!-- ✅ Corrected path: ../assets/images/logo.png -->
    <img src="../assets/images/logo.png" alt="eSIMNest Logo" class="logo-img">
    <div class="brand">eSIMNest</div>
    <div class="slogan">Global Data eSIM</div>
    <div class="company">A Tech Talk Titans Product</div>
    <div class="spinner"></div>
  </div>
  
  <script src="main.dart.js" defer></script>
  <script>
    // Remove loading screen when Flutter loads
    window.addEventListener('load', function() {
      setTimeout(function() {
        const loading = document.getElementById('loading');
        if (loading) {
          loading.style.opacity = '0';
          loading.style.transition = 'opacity 0.5s ease';
          setTimeout(function() {
            loading.style.display = 'none';
          }, 500);
        }
      }, 1000);
    });
  </script>
</body>
</html>
