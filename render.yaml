services:
  # Backend API Service
  - type: web
    name: esmnst-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ALLOWED_ORIGINS
        value: https://esmnst-frontend.onrender.com,http://localhost:3000

  # Frontend Static Site
  - type: web
    name: esmnst-frontend
    env: static
    buildCommand: |
      cd frontend
      chmod +x build.sh
      ./build.sh
    staticPublishPath: frontend/build/web
    envVars:
      - key: API_URL
        value: https://esmnst.onrender.com/api
      - key: FIREBASE_API_KEY
        value: ${FIREBASE_API_KEY}
      - key: FIREBASE_AUTH_DOMAIN
        value: ${FIREBASE_AUTH_DOMAIN}
      - key: FIREBASE_PROJECT_ID
        value: ${FIREBASE_PROJECT_ID}
      - key: FIREBASE_STORAGE_BUCKET
        value: ${FIREBASE_STORAGE_BUCKET}
      - key: FIREBASE_MESSAGING_SENDER_ID
        value: ${FIREBASE_MESSAGING_SENDER_ID}
      - key: FIREBASE_APP_ID
        value: ${FIREBASE_APP_ID}
    rootDir: .
