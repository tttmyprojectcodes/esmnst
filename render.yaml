services:
  # Backend API Service
  - type: web
    name: esmnst-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ALLOWED_ORIGINS
        value: https://esmnst-frontend.onrender.com,http://localhost:3000
    rootDir: backend
