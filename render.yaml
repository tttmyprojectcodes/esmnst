services:
  # Backend API Service
  - type: web
    name: esmnst-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ALLOWED_ORIGINS
        value: https://esmnst-frontend.onrender.com,http://localhost:3000
    rootDir: backend

  # Frontend Static Site
  - type: web
    name: esmnst-frontend
    env: static
    buildCommand: |
      cd frontend
      chmod +x build.sh
      ./build.sh
    staticPublishPath: frontend/build/web
    envVars:
      - key: API_URL
        value: https://esmnst-backend.onrender.com
    rootDir: .
